<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>रासायनिक नाम और सूत्र - Quiz & Flashcards</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #2c3e50;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f5f7fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--secondary-color);
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            color: #888;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Flashcard Styles */
        .flashcard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            perspective: 1000px;
        }

        .flashcard {
            width: 350px;
            height: 220px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .flashcard.flip {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .card-back {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .card-subtext {
            font-size: 16px;
            font-weight: normal;
            margin-top: 10px;
            opacity: 0.9;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        button.btn {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: var(--secondary-color);
            color: white;
            transition: background 0.2s;
        }

        button.btn:hover {
            background-color: #34495e;
        }

        /* Quiz Styles */
        .quiz-container {
            display: flex;
            flex-direction: column;
        }

        .question {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--secondary-color);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            padding: 15px;
            font-size: 16px;
            text-align: left;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: #e9ecef;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: var(--success-color);
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: var(--danger-color);
            color: #721c24;
        }

        .score-board {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
        }
        
        sub {
            font-size: 0.6em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>रसायन विज्ञान: सूत्र और नाम (Study App)</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('flashcards')">Flashcards</button>
        <button class="tab-btn" onclick="switchTab('quiz')">Quiz Mode</button>
    </div>

    <div id="flashcards-tab" class="tab-content active">
        <div class="flashcard-container">
            <div class="flashcard" id="card" onclick="flipCard()">
                <div class="card-face card-front" id="card-front">
                    </div>
                <div class="card-face card-back" id="card-back">
                    </div>
            </div>
            <div class="controls">
                <button class="btn" onclick="prevCard()">पिछला (Prev)</button>
                <button class="btn" onclick="nextCard()">अगला (Next)</button>
            </div>
            <p id="card-progress" style="margin-top: 15px; color: #666;"></p>
        </div>
    </div>

    <div id="quiz-tab" class="tab-content">
        <div class="quiz-container">
            <div class="question" id="quiz-question">प्रश्न यहाँ लोड होगा...</div>
            <div class="options-grid" id="quiz-options">
                </div>
            <button class="btn" id="next-quiz-btn" onclick="nextQuizQuestion()" style="display: none; align-self: flex-end;">अगला प्रश्न</button>
            <div class="score-board" id="score-board">स्कोर: 0 / 0</div>
        </div>
    </div>
</div>

<script>
    // PDF से लिया गया डेटा (Formulas & Names) [cite: 1]
    const chemicalData = [
        { formula: "N<sub>2</sub>O", name: "Nitrous Oxide (नाइट्रस ऑक्साइड)", common: "Laughing gas (हंसाने वाली गैस)" },
        { formula: "H<sub>2</sub>SO<sub>4</sub>", name: "Sulfuric acid (सल्फ्यूरिक अम्ल)", common: "अम्लों का राजा" },
        { formula: "HNO<sub>3</sub>", name: "Nitric Acid (नाइट्रिक अम्ल)", common: "शोरे का अम्ल" },
        { formula: "CaCO<sub>3</sub>", name: "Calcium Carbonate (कैल्शियम कार्बोनेट)", common: "Limestone / चूनापत्थर" },
        { formula: "NaOH", name: "Sodium Hydroxide (सोडियम हाइड्रोक्साइड)", common: "Caustic Soda (कास्टिक सोडा)" },
        { formula: "CaOCl<sub>2</sub> / Ca(OCl)<sub>2</sub>", name: "Calcium Oxychloride", common: "Bleaching powder (विरंजक चूर्ण)" },
        { formula: "NaHCO<sub>3</sub>", name: "Sodium Bicarbonate (सोडियम बाइकार्बोनेट)", common: "Baking soda (खाने का सोडा)" },
        { formula: "CH<sub>4</sub>", name: "Methane (मीथेन)", common: "Marsh Gas" },
        { formula: "Fe<sub>2</sub>O<sub>3</sub>", name: "Iron Oxide (आयरन ऑक्साइड)", common: "Rust (जंग)" },
        { formula: "CO", name: "Carbon monoxide (कार्बन मोनोऑक्साइड)", common: "जहरीली गैस" },
        { formula: "O<sub>3</sub>", name: "Ozone (ओजोन)", common: "ऑक्सीजन का अपररूप" },
        { formula: "H<sub>2</sub>O<sub>2</sub>", name: "Hydrogen peroxide", common: "एंटीसेप्टिक" },
        { formula: "NH<sub>3</sub>", name: "Ammonia (अमोनिया)", common: "तीक्ष्ण गंध वाली गैस" }
    ];

    // State Variables
    let currentCardIndex = 0;
    let currentQuizIndex = 0;
    let score = 0;
    let quizQuestionsAnswered = 0;
    let quizQuestions = [];

    // Tab Switching Function
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        if(tabName === 'flashcards') {
            document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
            document.getElementById('flashcards-tab').classList.add('active');
            initFlashcards();
        } else {
            document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
            document.getElementById('quiz-tab').classList.add('active');
            initQuiz();
        }
    }

    // Flashcard Functions
    function initFlashcards() {
        const card = document.getElementById('card');
        card.classList.remove('flip');
        
        const current = chemicalData[currentCardIndex];
        document.getElementById('card-front').innerHTML = `<div>${current.formula}</div><div class="card-subtext">इसका नाम क्या है? (क्लिक करें)</div>`;
        document.getElementById('card-back').innerHTML = `<div>${current.name}</div><div class="card-subtext">साधारण नाम: ${current.common}</div>`;
        document.getElementById('card-progress').innerText = `कार्ड: ${currentCardIndex + 1} / ${chemicalData.length}`;
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flip');
    }

    function nextCard() {
        currentCardIndex = (currentCardIndex + 1) % chemicalData.length;
        initFlashcards();
    }

    function prevCard() {
        currentCardIndex = (currentCardIndex - 1 + chemicalData.length) % chemicalData.length;
        initFlashcards();
    }

    // Quiz Functions
    function initQuiz() {
        score = 0;
        quizQuestionsAnswered = 0;
        // Shuffle and take questions
        quizQuestions = [...chemicalData].sort(() => 0.5 - Math.random());
        currentQuizIndex = 0;
        showQuizQuestion();
    }

    function showQuizQuestion() {
        if (currentQuizIndex >= quizQuestions.length) {
            document.getElementById('quiz-question').innerText = `क्विज़ समाप्त! आपका अंतिम स्कोर ${score} / ${quizQuestions.length} है।`;
            document.getElementById('quiz-options').innerHTML = '';
            document.getElementById('next-quiz-btn').style.display = 'none';
            return;
        }

        document.getElementById('next-quiz-btn').style.display = 'none';
        const currentQ = quizQuestions[currentQuizIndex];
        document.getElementById('quiz-question').innerHTML = `प्रश्न ${currentQuizIndex + 1}: रासायनिक सूत्र <strong>${currentQ.formula}</strong> का सही नाम क्या है?`;
        
        // Generate Options (1 correct, 3 wrong)
        let options = [currentQ];
        let wrongOptions = chemicalData.filter(item => item.formula !== currentQ.formula);
        wrongOptions.sort(() => 0.5 - Math.random());
        options.push(wrongOptions[0], wrongOptions[1], wrongOptions[2]);
        // Shuffle Options
        options.sort(() => 0.5 - Math.random());

        const optionsContainer = document.getElementById('quiz-options');
        optionsContainer.innerHTML = '';

        options.forEach(opt => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerText = opt.name;
            button.onclick = () => checkAnswer(button, opt.formula, currentQ.formula);
            optionsContainer.appendChild(button);
        });

        document.getElementById('score-board').innerText = `स्कोर: ${score} / ${quizQuestionsAnswered}`;
    }

    function checkAnswer(selectedButton, selectedFormula, correctFormula) {
        // Disable all buttons after selection
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        quizQuestionsAnswered++;

        if (selectedFormula === correctFormula) {
            selectedButton.classList.add('correct');
            score++;
        } else {
            selectedButton.classList.add('wrong');
            // Show correct answer
            buttons.forEach(btn => {
                // Find correct option to highlight
                const optionData = quizQuestions[currentQuizIndex];
                if(btn.innerText === optionData.name) {
                    btn.classList.add('correct');
                }
            });
        }

        document.getElementById('score-board').innerText = `स्कोर: ${score} / ${quizQuestionsAnswered}`;
        document.getElementById('next-quiz-btn').style.display = 'block';
    }

    function nextQuizQuestion() {
        currentQuizIndex++;
        showQuizQuestion();
    }

    // Initialize on page load
    window.onload = function() {
        initFlashcards();
    };
</script>

</body>
</html>
